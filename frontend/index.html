<body>
<div id="root"></div>
<script type="text/babel">
// ═══════════════════════════════════════════════════════════════════
// DESIGN TOKENS
// ═══════════════════════════════════════════════════════════════════
const BO = {
  bg:           '#0a0d1a',
  bgAlt:        '#0f1324',
  panel:        '#131729',
  panel2:       '#1a1f33',
  border:       '#252a42',
  borderSoft:   '#1d2238',
  text:         '#f1f3fa',
  textMuted:    '#9ba3c0',
  textDim:      '#6b7293',
  primary:      '#6366f1',
  primaryHover: '#7779f5',
  primarySoft:  'rgba(99,102,241,0.15)',
  gaming:       '#a78bfa',
  content:      '#22d3ee',
  workstation:  '#10b981',
  general:      '#fbbf24',
  danger:       '#ef4444',
  success:      '#10b981',

const USECASE = {
  Gaming:      { hue: BO.gaming,      bg: 'rgba(167,139,250,0.12)' },
  Content:     { hue: BO.content,     bg: 'rgba(34,211,238,0.12)'  },

// ═══════════════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════════════
const API_BASE = 'https://buildoptima-production.up.railway.app';

async function apiFetch(path, opts = {}) {
  const token = localStorage.getItem('bo_token');
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(`${API_BASE}${path}`, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

const UC_MAP = { Gaming: 'gaming', Content: 'content_creation', Workstation: 'workstation', General: 'general' };
const UC_DISPLAY = { gaming: 'Gaming', content_creation: 'Content', workstation: 'Workstation', general: 'General' };
const CAT_ICON  = { cpu:'cpu', gpu:'gpu', ram:'ram', storage:'storage', motherboard:'mobo', psu:'psu', 'case':'case', cooler:'cooler' };
const CAT_LABEL = { cpu:'CPU', gpu:'GPU', ram:'RAM', storage:'SSD', motherboard:'MOBO', psu:'PSU', 'case':'CASE', cooler:'COOL' };
const CAT_COLOR = { cpu:BO.content, gpu:BO.gaming, ram:BO.general, storage:'#f472b6', motherboard:BO.workstation, psu:'#60a5fa', 'case':'#fb7185', cooler:'#34d399' };

// ═══════════════════════════════════════════════════════════════════
// GLOBAL CSS

    .filter-pill {

// ═══════════════════════════════════════════════════════════════════
// HOOKS
// ═══════════════════════════════════════════════════════════════════
function useIsMobile(bp = 768) {
  const [v, setV] = React.useState(() => window.innerWidth <= bp);
  React.useEffect(() => {
    const h = () => setV(window.innerWidth <= bp);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, [bp]);
  return v;
}

// ═══════════════════════════════════════════════════════════════════
// SHARED
// ═══════════════════════════════════════════════════════════════════
function Chip({ usecase, size = 'md' }) {
  const uc = USECASE[usecase] || USECASE.General;
  const sz = size === 'sm' ? { padding: '2px 8px', fontSize: 11 } : { padding: '3px 10px', fontSize: 12 };
  return (
    <span className="bo-chip" style={{ background: uc.bg, color: uc.hue, ...sz }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: uc.hue, flexShrink: 0 }} />
      {usecase}
    </span>
  );
}

function Logomark({ size = 30 }) {
  return (
    <div className="bo-logomark" style={{ width: size, height: size, fontSize: size * 0.47 }}>B</div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════════
function Nav({ active, auth = 'out', onNavigate, user, onLogout }) {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const isMobile = useIsMobile();
  const go = (s) => { onNavigate(s); setMenuOpen(false); };
  const userEmail = user?.email || '';
  const userInitial = userEmail ? userEmail[0].toUpperCase() : 'U';

  const links = [
    { id: 'landing', label: 'Home' },
    { id: 'optimizer', label: 'Optimizer' },
    { id: 'saved', label: 'My Builds' },
    { id: 'compare', label: 'Compare' },
  ];

  return (
    <>
      <nav className="bo-nav">
        <div className="bo-logo" onClick={() => go('landing')}>
          <Logomark size={isMobile ? 28 : 30} />
          <span style={{ fontSize: isMobile ? 16 : 18 }}>MPOptima</span>
        </div>

        {/* Desktop links */}
        <div className="bo-navlinks desktop-nav">
          {links.map(l => (
            <a key={l.id} className={active === l.id ? 'active' : ''} onClick={() => go(l.id)}>{l.label}</a>
          ))}
        </div>

        <div style={{ flex: 1 }} />

        {/* Desktop auth */}
        <div className="desktop-nav" style={{ display: 'flex' }}>
          {auth === 'in' ? (
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <span style={{ fontSize: 13, color: BO.textMuted }}>{userEmail}</span>
              <div style={{ width: 34, height: 34, borderRadius: '50%',
                background: `linear-gradient(135deg, ${BO.primary}, #8b5cf6)`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontWeight: 700, fontSize: 13, cursor: 'pointer', flexShrink: 0 }}>{userInitial}</div>
              <button className="bo-btn ghost sm" onClick={onLogout}>Log out</button>
            </div>
          ) : (
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="bo-btn ghost sm" onClick={() => go('login')}>Log in</button>
              <button className="bo-btn primary sm" onClick={() => go('signup')}>Sign up</button>
            </div>
          )}
        </div>

        {/* Mobile burger */}
        <button className="mobile-nav bo-btn subtle sm icon-sq" aria-label="Toggle menu" onClick={() => setMenuOpen(o => !o)}>
          <Icon name={menuOpen ? 'close' : 'menu'} size={20} />
        </button>
      </nav>

      {/* Mobile full-screen menu */}
      {isMobile && menuOpen && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 100, background: BO.bg, display: 'flex', flexDirection: 'column' }}>
          <nav className="bo-nav" style={{ padding: '14px 20px', gap: 0 }}>
            <div className="bo-logo" onClick={() => go('landing')}>
              <Logomark size={28} />
              <span style={{ fontSize: 16 }}>MPOptima</span>
            </div>
            <div style={{ flex: 1 }} />
            <button className="bo-btn subtle sm icon-sq" aria-label="Close menu" onClick={() => setMenuOpen(false)}>
              <Icon name="close" size={20} />
            </button>
          </nav>
          <div style={{ flex: 1, padding: '28px 24px', display: 'flex', flexDirection: 'column', overflowY: 'auto' }}>
            <div style={{ fontFamily: BO.mono, fontSize: 11, letterSpacing: 1, color: BO.textDim, marginBottom: 20 }}>MENU</div>
            {links.map(l => (
              <a key={l.id} onClick={() => go(l.id)} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '20px 0', borderBottom: `1px solid ${BO.borderSoft}`,
                fontSize: 22, fontWeight: 700, letterSpacing: -0.5, cursor: 'pointer',
                color: active === l.id ? BO.primary : BO.text,
              }}>
                {l.label}
                <Icon name="chev" size={18} color={active === l.id ? BO.primary : BO.textDim} />
              </a>
            ))}
            <div style={{ flex: 1 }} />
            {auth === 'in' ? (
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '16px 0', borderTop: `1px solid ${BO.borderSoft}`, marginTop: 20 }}>
                <div style={{ width: 38, height: 38, borderRadius: '50%', background: `linear-gradient(135deg, ${BO.primary}, #8b5cf6)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 14 }}>{userInitial}</div>
                <div>
                  <div style={{ fontSize: 12, color: BO.textMuted }}>{userEmail}</div>
                </div>
                <div style={{ flex: 1 }} />
                <button className="bo-btn ghost sm" onClick={onLogout}>Log out</button>
              </div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 20 }}>
                <button className="bo-btn primary" style={{ padding: '14px', fontSize: 15 }} onClick={() => go('signup')}>Sign up free</button>

}

// ═══════════════════════════════════════════════════════════════════
// LANDING
// ═══════════════════════════════════════════════════════════════════

function DonutChart({ size = 180, alloc = ALLOC, totalLabel = '$1,512' }) {
  const total = alloc.reduce((a, b) => a + b.v, 0);
  const r = size / 2 - 16, cx = size / 2, cy = size / 2, ri = r * 0.62;
  let acc = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} aria-label="Budget allocation donut chart">
      {alloc.map((s, i) => {
        const a0 = (acc / total) * Math.PI * 2 - Math.PI / 2;
        acc += s.v;
        const a1 = (acc / total) * Math.PI * 2 - Math.PI / 2;
        const lg = a1 - a0 > Math.PI ? 1 : 0;
        const x1 = cx + r  * Math.cos(a0), y1 = cy + r  * Math.sin(a0);
        const x2 = cx + r  * Math.cos(a1), y2 = cy + r  * Math.sin(a1);
        const x3 = cx + ri * Math.cos(a1), y3 = cy + ri * Math.sin(a1);
        const x4 = cx + ri * Math.cos(a0), y4 = cy + ri * Math.sin(a0);
        return <path key={i} d={`M ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} L ${x3} ${y3} A ${ri} ${ri} 0 ${lg} 0 ${x4} ${y4} Z`} fill={s.c} stroke={BO.panel} strokeWidth="2" />;
      })}
      <text x={cx} y={cy - 4}  textAnchor="middle" fill={BO.text}    fontSize="20" fontWeight="800" fontFamily={BO.sans}>{totalLabel}</text>
      <text x={cx} y={cy + 14} textAnchor="middle" fill={BO.textDim} fontSize="11" fontFamily={BO.mono} letterSpacing="1">TOTAL</text>
    </svg>
  );
}

              </div>
            ))}
            <div style={{ marginTop: 18, padding: 14, background: BO.bg, borderRadius: 8, border: `1px solid ${BO.borderSoft}` }}>
              <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 6, display: 'flex', alignItems: 'center', gap: 6 }}>
                <Icon name="ai" size={14} color={BO.primary} /> WHY THIS BUILD?
              </div>
              <div style={{ fontSize: 12.5, color: BO.textMuted, lineHeight: 1.55 }}>
                {result
                  ? `Optimized for ${useCase.toLowerCase()} at $${budget.toLocaleString()}. ${result.components.length} components chosen to maximize value within budget.`
                  : `Click "Optimize My Build" to generate a personalized ${useCase.toLowerCase()} build for your budget.`}
              </div>
            </div>
          </div>
        )}
      </div>
    </main>
  );

  return (
    <div className="bo-root page-enter" style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <Nav active="optimizer" auth={auth} onNavigate={onNavigate} user={user} onLogout={onLogout} />

        height: isMobile ? 'auto' : 'calc(100vh - 63px)',
      }}>
        <Sidebar />
        <MainPanel />
      </div>
    </div>
  );
}

];
const PICONS = ['cpu', 'gpu', 'ram', 'storage', 'mobo', 'psu', 'case'];

function SavedPage({ onNavigate, auth, user }) {
  const isMobile = useIsMobile();
  const [filter, setFilter] = React.useState('All');
  const [search, setSearch] = React.useState('');
  const [builds, setBuilds] = React.useState([]);
  const [fetchLoading, setFetchLoading] = React.useState(false);
  const [fetchError, setFetchError] = React.useState('');

  React.useEffect(() => {
    if (auth !== 'in') return;
    setFetchLoading(true);
    setFetchError('');
    apiFetch('/builds')
      .then(data => setBuilds(data))
      .catch(err => setFetchError(err.message))
      .finally(() => setFetchLoading(false));
  }, [auth]);

  const handleDelete = async (id) => {
    try {
      await apiFetch(`/builds/${id}`, { method: 'DELETE' });
      setBuilds(prev => prev.filter(b => b.id !== id));
    } catch (err) {
      setFetchError(`Delete failed: ${err.message}`);
    }
  };

  const formatDate = (dt) => new Date(dt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  const visible = builds
    .filter(b => filter === 'All' || UC_DISPLAY[b.use_case] === filter)
    .filter(b => !search || b.build_name.toLowerCase().includes(search.toLowerCase()));

  const counts = { All: builds.length, Gaming: 0, Content: 0, Workstation: 0, General: 0 };
  builds.forEach(b => { const k = UC_DISPLAY[b.use_case]; if (k && counts[k] !== undefined) counts[k]++; });

            <div style={{ marginTop: 12, fontSize: 15 }}>
              {builds.length === 0 ? "No saved builds yet — optimize a build and save it!" : "No builds match your search"}

            {builds.length > 0
              ? <button className="bo-btn ghost sm" style={{ marginTop: 16 }} onClick={() => { setSearch(''); setFilter('All'); }}>Clear filters</button>

            }

        ))}

        {/* Pagination */}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 6, marginTop: 32 }}>
          <button className="bo-btn subtle icon-sq" aria-label="Previous page"><Icon name="chev" size={14} style={{ transform: 'rotate(180deg)' }} /></button>

            <button key={n} style={{

      </div>

  );

// AUTH
// ═══════════════════════════════════════════════════════════════════
function AuthPage({ mode, onNavigate, onSuccess }) {
  const isMobile = useIsMobile();
  const isLogin = mode === 'login';
  const [email, setEmail] = React.useState('');
  const [pass, setPass] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const path = isLogin ? '/auth/login' : '/auth/register';
      const data = await apiFetch(path, {
        method: 'POST',
        body: JSON.stringify({ email, password: pass }),
      });
      localStorage.setItem('bo_token', data.access_token);
      localStorage.setItem('bo_user', JSON.stringify({ email }));
      onSuccess({ email });
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="bo-root page-enter" style={{ position: 'relative', overflow: 'hidden', minHeight: '100vh' }}>
      <Nav onNavigate={onNavigate} />
      <div className="bo-glow" style={{ opacity: 0.7 }} />
      <div style={{
        position: 'relative', zIndex: 1,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        minHeight: 'calc(100vh - 63px)', padding: isMobile ? '24px 20px' : 40,
      }}>
        <div className="bo-card" style={{ width: '100%', maxWidth: 420, padding: isMobile ? '28px 22px' : 36 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
            <Logomark />
            <span style={{ fontSize: 17, fontWeight: 700 }}>MPOptima</span>
          </div>
          <h2 style={{ fontSize: 24, margin: 0, fontWeight: 800, letterSpacing: -0.5 }}>
            {isLogin ? 'Welcome back!' : 'Create your account'}
          </h2>
          <p style={{ fontSize: 14, color: BO.textMuted, marginTop: 6, marginBottom: 26 }}>
            {isLogin ? 'Log in to access your saved builds.' : 'Sign up to save and compare your builds.'}
          </p>

          <form onSubmit={handleSubmit}>
            {error && <div style={{ padding: '10px 14px', background: 'rgba(239,68,68,0.1)', border: `1px solid rgba(239,68,68,0.3)`, borderRadius: 8, color: '#fca5a5', fontSize: 13, marginBottom: 16 }}>{error}</div>}
            <div style={{ marginBottom: 16 }}>
              <label htmlFor="auth-email" style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Email</label>
              <div style={{ position: 'relative' }}>
                <div style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', zIndex: 1, pointerEvents: 'none' }}>
                  <Icon name="mail" size={15} color={BO.textDim} />
                </div>
                <input id="auth-email" className="bo-input" type="email" placeholder="you@example.com" value={email} onChange={e => setEmail(e.target.value)} style={{ paddingLeft: 40 }} autoComplete="email" />
              </div>
            </div>
            <div style={{ marginBottom: isLogin ? 8 : 18 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <label htmlFor="auth-pass" style={{ fontSize: 13, fontWeight: 600 }}>Password</label>
                {isLogin && <a style={{ fontSize: 12, color: BO.primary, fontWeight: 600, cursor: 'pointer' }}>Forgot password?</a>}
              </div>
              <div style={{ position: 'relative' }}>
                <div style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', zIndex: 1, pointerEvents: 'none' }}>
                  <Icon name="lock" size={15} color={BO.textDim} />
                </div>
                <input id="auth-pass" className="bo-input" type="password" placeholder="••••••••" value={pass} onChange={e => setPass(e.target.value)} style={{ paddingLeft: 40 }} autoComplete={isLogin ? 'current-password' : 'new-password'} />
              </div>
              {!isLogin && <div style={{ fontSize: 11, color: BO.textDim, marginTop: 6 }}>At least 8 characters with a number.</div>}
            </div>

            {isLogin && (
              <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: BO.textMuted, marginBottom: 20, cursor: 'pointer' }}>
                <span style={{ width: 16, height: 16, borderRadius: 4, border: `1px solid ${BO.border}`, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: BO.bg, flexShrink: 0 }} />
                Remember me for 30 days
              </label>
            )}

            <button type="submit" className="bo-btn primary" style={{ width: '100%', padding: '12px', fontSize: 15 }} disabled={loading}>
              {loading ? (isLogin ? 'Logging in…' : 'Creating account…') : (isLogin ? 'Log in' : 'Sign Up')}
            </button>
          </form>

          <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '22px 0', fontSize: 12, color: BO.textDim }}>
            <div style={{ flex: 1, height: 1, background: BO.borderSoft }} />
            <span>or continue with</span>
            <div style={{ flex: 1, height: 1, background: BO.borderSoft }} />
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button className="bo-btn subtle" style={{ flex: 1 }}>Google</button>
            <button className="bo-btn subtle" style={{ flex: 1 }}>Apple</button>
          </div>
          <div style={{ textAlign: 'center', marginTop: 24, fontSize: 13, color: BO.textMuted }}>
            {isLogin ? "Don't have an account? " : 'Already have an account? '}
            <a style={{ color: BO.primary, fontWeight: 600, cursor: 'pointer' }} onClick={() => onNavigate(isLogin ? 'signup' : 'login')}>
              {isLogin ? 'Sign up' : 'Log in'}
            </a>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// APP ROUTER
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = React.useState('landing');
  const [user, setUser] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('bo_user') || 'null'); } catch { return null; }
  });
  const auth = user ? 'in' : 'out';

  const navigate = React.useCallback((s) => {
    setScreen(s);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const handleAuthSuccess = React.useCallback((userData) => {
    setUser(userData);
    navigate('optimizer');
  }, [navigate]);

  const handleLogout = React.useCallback(() => {
    localStorage.removeItem('bo_token');
    localStorage.removeItem('bo_user');
    setUser(null);
    navigate('landing');
  }, [navigate]);

  const props = { onNavigate: navigate, auth, user, onLogout: handleLogout };

  return (
    <React.Fragment key={screen}>
      {screen === 'landing'   && <LandingPage   {...props} />}
      {screen === 'optimizer' && <OptimizerPage {...props} />}
      {screen === 'saved'     && <SavedPage     {...props} />}
      {screen === 'compare'   && <ComparePage   {...props} />}
      {screen === 'login'     && <AuthPage mode="login"  onNavigate={navigate} onSuccess={handleAuthSuccess} />}
      {screen === 'signup'    && <AuthPage mode="signup" onNavigate={navigate} onSuccess={handleAuthSuccess} />}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
